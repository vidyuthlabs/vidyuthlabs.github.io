<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parakram LVGL Pro — Visual Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#1e1e1e;--bg1:#252526;--bg2:#333333;--accent:#007fd4;--cyan:#22d3ee;--green:#34d399;--text:#cccccc;--text1:#d4d4d4;--text2:#858585;--border:#3c3c3c;--r:4px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}

        .studio{display:grid;grid-template-columns:260px 1fr 280px;grid-template-rows:48px 1fr 24px;height:100vh}

        /* Top Bar */
        .topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
        .topbar-left{display:flex;align-items:center;gap:12px}
        .topbar-logo{width:24px;height:24px;background:var(--accent);border-radius:4px;display:grid;place-items:center;font-size:12px;color:#fff;font-weight:700}
        .topbar-title{font-size:13px;font-weight:600;color:var(--text1)}
        .topbar-center{display:flex;gap:4px}
        .display-select{padding:4px 8px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Inter',sans-serif;font-size:11px;outline:none}
        .topbar-right{display:flex;gap:6px}
        .tb-btn{padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg1);color:var(--text1);font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;transition:all .15s}
        .tb-btn:hover{background:var(--bg2);border-color:#555}
        .tb-btn.primary{background:var(--accent);color:#fff;border:none}
        .tb-btn.primary:hover{background:#006bb3}

        /* Left Panel — Hierarchy & Palette */
        .left-panel{background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column}
        .panel-header{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);font-weight:600;padding:12px;border-bottom:1px solid var(--border);background:var(--bg)}
        
        .hierarchy{flex:1;overflow-y:auto;padding:8px 0;border-bottom:1px solid var(--border)}
        .tree-item{padding:4px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:0s}
        .tree-item:hover{background:var(--bg2)}
        .tree-item.selected{background:var(--accent);color:#fff}
        .tree-icon{font-size:14px;opacity:0.7}
        .tree-indent{width:12px;display:inline-block}

        .palette{height:40%;overflow-y:auto;padding:12px;background:var(--bg1)}
        .widget-list{display:grid;grid-template-columns:1fr 1fr;gap:4px}
        .widget-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:8px;text-align:center;cursor:grab;user-select:none;font-size:11px}
        .widget-item:hover{border-color:#555;background:var(--bg2)}

        /* Center — Canvas & Code */
        .center-area{display:flex;flex-direction:column;background:#1e1e1e;position:relative}
        .canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:radial-gradient(circle, #2a2a2a 2px, transparent 2px);background-size:20px 20px}
        .device-frame{background:#000;border:1px solid #111;box-shadow:0 10px 40px rgba(0,0,0,.6);position:relative}
        .display-surface{position:relative;overflow:hidden;cursor:crosshair;background:#111}

        /* Node rendering */
        .node{position:absolute;box-sizing:border-box;cursor:default}
        .node.selected{box-shadow:inset 0 0 0 1px var(--accent), 0 0 0 1px var(--accent);z-index:100}
        .node-cont{border:1px dashed #444;background:rgba(255,255,255,0.02)}
        .node-flex-row{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:8px}
        .node-flex-col{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
        .node-btn{background:#3b82f6;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 4px rgba(0,0,0,.3)}
        .node-label{color:#fff;display:flex;align-items:center;justify-content:center;white-space:nowrap}
        .node-img{background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:var(--cyan);font-weight:600;font-size:10px;border-radius:4px}

        /* Code View */
        .code-panel{height:180px;background:#1e1e1e;border-top:1px solid var(--border);display:flex;flex-direction:column}
        .code-header{padding:6px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);display:flex;justify-content:space-between}
        .code-view{flex:1;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#d4d4d4;overflow-y:auto;white-space:pre}
        .keyword{color:#569cd6} .type{color:#4ec9b0} .func{color:#dcdcaa} .str{color:#ce9178} .num{color:#b5cea8} .comment{color:#6a9955}

        /* Right Panel — Properties */
        .properties{background:var(--bg1);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
        .prop-section{border-bottom:1px solid var(--border)}
        .prop-header{padding:8px 12px;font-size:11px;font-weight:600;background:var(--bg);color:var(--text1)}
        .prop-body{padding:12px;display:flex;flex-direction:column;gap:8px}
        .prop-row{display:flex;align-items:center;justify-content:space-between}
        .prop-label{font-size:11px;color:var(--text2);width:70px}
        .prop-input{flex:1;padding:4px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;outline:none}
        .prop-input:focus{border-color:var(--accent)}
        .prop-select{flex:1;padding:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:10px;outline:none}

        /* Status Bar */
        .statusbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:var(--accent);color:#fff;font-size:10px}
        
    </style>
</head>
<body>
<div class="studio">
    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo">L</div>
            <div class="topbar-title">LVGL Pro Editor</div>
        </div>
        <div class="topbar-center">
            <select class="display-select" id="dispSelect" onchange="changeDisplay()">
                <option value="320x240">Standard TFT 320×240</option>
                <option value="480x320">Large TFT 480×320</option>
                <option value="240x240">Square Smartwatch 240×240</option>
                <option value="128x64">Monochrome SSD1306 128×64</option>
            </select>
        </div>
        <div class="topbar-right">
            <button class="tb-btn" onclick="clearDOM()">🗑 Clear</button>
            <button class="tb-btn primary" onclick="exportIR()">⚡ Export to Parakram Bytecode</button>
        </div>
    </div>

    <!-- Left Panel -->
    <div class="left-panel">
        <div class="panel-header">Hierarchy Tree</div>
        <div class="hierarchy" id="treeView"></div>

        <div class="panel-header">Components</div>
        <div class="palette">
            <div class="widget-list">
                <div class="widget-item" draggable="true" ondragstart="dragStart(event,'cont')">🔲 Container</div>
                <div class="widget-item" draggable="true" ondragstart="dragStart(event,'btn')">🟦 Button</div>
                <div class="widget-item" draggable="true" ondragstart="dragStart(event,'label')">Aa Label</div>
                <div class="widget-item" draggable="true" ondragstart="dragStart(event,'slider')">🎚 Slider</div>
                <div class="widget-item" draggable="true" ondragstart="dragStart(event,'img')">🖼 Image</div>
                <div class="widget-item" draggable="true" ondragstart="dragStart(event,'bar')">▰ Bar</div>
            </div>
        </div>
    </div>

    <!-- Center Canvas -->
    <div class="center-area">
        <div class="canvas-wrap" id="canvasWrap">
            <div class="device-frame" id="deviceFrame">
                <div class="display-surface" id="dispSurface" ondrop="dropNode(event)" ondragover="dragOver(event)" onclick="deselectAll(event)">
                </div>
            </div>
        </div>
        
        <!-- Live Code Generation -->
        <div class="code-panel">
            <div class="code-header">
                <span>app_ui.c (Live Output)</span>
            </div>
            <div class="code-view" id="codeView"></div>
        </div>
    </div>

    <!-- Right Properties -->
    <div class="properties" id="propsPanel">
        <div class="prop-section">
            <div class="prop-header">LVGL Object Settings</div>
            <div class="prop-body">
                <div class="prop-row"><div class="prop-label">ID Name</div><input class="prop-input" id="pId" oninput="updateProp('idName')"></div>
                <div class="prop-row"><div class="prop-label">X, Y</div>
                    <div style="display:flex;gap:4px;flex:1"><input class="prop-input" id="pX" type="number" onchange="updateProp('x')"><input class="prop-input" id="pY" type="number" onchange="updateProp('y')"></div>
                </div>
                <div class="prop-row"><div class="prop-label">W, H</div>
                    <div style="display:flex;gap:4px;flex:1"><input class="prop-input" id="pW" type="number" onchange="updateProp('w')"><input class="prop-input" id="pH" type="number" onchange="updateProp('h')"></div>
                </div>
            </div>
        </div>
        <div class="prop-section" id="secFlex" style="display:none">
            <div class="prop-header">Flex Layout</div>
            <div class="prop-body">
                <div class="prop-row"><div class="prop-label">Flow</div>
                    <select class="prop-select" id="pFlex" onchange="updateProp('flex')">
                        <option value="none">LV_FLEX_ALIGN_NONE</option>
                        <option value="row">LV_FLEX_ALIGN_ROW</option>
                        <option value="col">LV_FLEX_ALIGN_COLUMN</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="prop-section" id="secText" style="display:none">
            <div class="prop-header">Text Settings</div>
            <div class="prop-body">
                <div class="prop-row"><div class="prop-label">Content</div><input class="prop-input" id="pText" oninput="updateProp('text')"></div>
                <div class="prop-row"><div class="prop-label">Binding</div><input class="prop-input" id="pBind" placeholder="$temperature" onchange="updateProp('binding')"></div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="statusbar">
        <div>LVGL Component Engine Ready</div>
        <div id="statRes">320 × 240</div>
    </div>
</div>

<script>
/* LVGL Hierarchical Data Model */
const API = window.location.hostname.includes("github.io") 
    ? "https://api.parakram.host" 
    : window.location.origin;

let rootNode = { id: "screen_1", idName: "screen_main", type: "screen", props: { w:320, h:240 }, children: [] };
let selectedNode = null;
let dragSourceType = null;
let nextId = 1;

function init() {
    changeDisplay();
    renderTree();
    renderCanvas();
    updateCodeView();
}

function changeDisplay() {
    const val = document.getElementById('dispSelect').value.split('x');
    rootNode.props.w = parseInt(val[0]);
    rootNode.props.h = parseInt(val[1]);
    
    document.getElementById('statRes').textContent = `${rootNode.props.w} × ${rootNode.props.h}`;
    
    const surf = document.getElementById('dispSurface');
    surf.style.width = rootNode.props.w + 'px';
    surf.style.height = rootNode.props.h + 'px';
    
    renderCanvas();
}

function clearDOM() {
    rootNode.children = [];
    selectedNode = null;
    generateIds();
    renderAll();
}

function generateIds() { nextId = 1; }

function getId() { return "obj_" + (nextId++); }

function getDefaultProps(type) {
    if(type === 'cont') return { x:10, y:10, w:100, h:80, flex: 'none' };
    if(type === 'btn') return { x:0, y:0, w:80, h:40, text: 'Button' };
    if(type === 'label') return { x:0, y:0, w:60, h:20, text: 'Label', binding: '' };
    if(type === 'slider') return { x:0, y:0, w:100, h:10 };
    if(type === 'img') return { x:0, y:0, w:40, h:40 };
    if(type === 'bar') return { x:0, y:0, w:80, h:8 };
    return { x:0, y:0, w:50, h:50 };
}

function dragStart(e, type) {
    dragSourceType = type;
    e.dataTransfer.setData('text', type);
}

function dragOver(e) {
    e.preventDefault();
}

// Find node by ID recursively
function findNode(id, node = rootNode) {
    if(node.id === id) return node;
    for(const c of node.children) {
        const found = findNode(id, c);
        if(found) return found;
    }
    return null;
}

// Recursively find a suitable container drop target under cursor
function findContainerDropTarget(e) {
    let targetId = e.target.dataset.id;
    if(!targetId) return rootNode;
    
    let targetNode = findNode(targetId);
    if(!targetNode) return rootNode;
    
    // Fallback up the tree to the closest container
    while(targetNode && targetNode.type !== 'screen' && targetNode.type !== 'cont') {
        // Need parent pointer or just use the immediate target's parent.
        // For simplicity in this demo, if target isn't a container, drop in root.
        targetNode = rootNode; 
    }
    return targetNode;
}

function dropNode(e) {
    e.preventDefault();
    e.stopPropagation();
    
    if(!dragSourceType) return;
    
    const parentNode = findContainerDropTarget(e);
    const rect = e.target.getBoundingClientRect();
    
    // If the parent is flex, X/Y are ignored by LVGL natively, but we'll capture them if not
    const x = Math.round(e.clientX - rect.left);
    const y = Math.round(e.clientY - rect.top);
    
    const newNode = {
        id: getId(),
        idName: `${dragSourceType}_${nextId-1}`,
        type: dragSourceType,
        props: { ...getDefaultProps(dragSourceType) },
        children: []
    };
    
    if(!parentNode.props.flex || parentNode.props.flex === 'none') {
        newNode.props.x = x;
        newNode.props.y = y;
    }

    parentNode.children.push(newNode);
    selectedNode = newNode;
    dragSourceType = null;
    
    renderAll();
}

function selectNode(id, e) {
    if(e) e.stopPropagation();
    selectedNode = findNode(id);
    renderAll();
}

function deselectAll() {
    selectedNode = null;
    renderAll();
}

function updateProp(propId) {
    if(!selectedNode) return;
    const val = document.getElementById('p'+propId.charAt(0).toUpperCase() + propId.slice(1)).value;
    
    if(propId === 'idName') selectedNode.idName = val;
    else if(propId === 'text' || propId === 'binding' || propId === 'flex') selectedNode.props[propId] = val;
    else selectedNode.props[propId] = parseInt(val) || 0;
    
    renderAll();
}

/* RENDERING LOOP */
function renderAll() {
    renderCanvas();
    renderTree();
    updatePropsPanel();
    updateCodeView();
}

function renderNodeDOM(node) {
    if(node.type === 'screen') {
        const frag = document.createDocumentFragment();
        node.children.forEach(c => frag.appendChild(renderNodeDOM(c)));
        return frag;
    }
    
    const el = document.createElement('div');
    el.className = `node node-${node.type}`;
    if(selectedNode && selectedNode.id === node.id) el.classList.add('selected');
    
    el.dataset.id = node.id;
    el.onclick = (e) => selectNode(node.id, e);
    
    el.style.width = node.props.w + 'px';
    el.style.height = node.props.h + 'px';
    
    // Positioning
    // If not in a flex layout, use absolute
    el.style.position = 'absolute';
    el.style.left = node.props.x + 'px';
    el.style.top = node.props.y + 'px';
    
    // Simulate Flexbox natively
    if(node.props.flex && node.props.flex !== 'none') {
        el.style.position = 'relative'; // Let flex take over children
        el.style.display = 'flex';
        el.style.justifyContent = 'center';
        el.style.alignItems = 'center';
        el.style.gap = '8px';
        if(node.props.flex === 'col') el.style.flexDirection = 'column';
    }

    if(node.type === 'btn') {
        el.innerHTML = `<span>${node.props.text}</span>`;
    } else if(node.type === 'label') {
        el.innerHTML = `<span>${node.props.binding || node.props.text}</span>`;
    } else if(node.type === 'slider') {
        el.style.background = '#444'; el.style.borderRadius='4px';
        el.innerHTML = `<div style="width:50%;height:100%;background:var(--accent);border-radius:4px"></div>`;
    } else if(node.type === 'bar') {
        el.style.background = '#444'; el.style.borderRadius='4px';
        el.innerHTML = `<div style="width:30%;height:100%;background:var(--cyan);border-radius:4px"></div>`;
    } else if(node.type === 'img') {
        el.innerHTML = `IMG`;
    }
    
    // Render children recursively
    if(node.children && node.children.length > 0) {
        node.children.forEach(c => {
            const childEl = renderNodeDOM(c);
            // If parent is flex, override absolute positioning
            if(node.props.flex && node.props.flex !== 'none') {
                childEl.style.position = 'relative';
                childEl.style.left = '0';
                childEl.style.top = '0';
            }
            el.appendChild(childEl);
        });
    }
    
    return el;
}

function renderCanvas() {
    const s = document.getElementById('dispSurface');
    s.innerHTML = '';
    s.appendChild(renderNodeDOM(rootNode));
}

function buildTreeHTML(node, depth) {
    const indent = `<span class="tree-indent" style="width:${depth*12}px"></span>`;
    const icon = node.type === 'screen' ? '📱' : node.type === 'cont' ? '🔲' : node.type === 'btn' ? '🟦' : node.type === 'img' ? '🖼' : '📄';
    const isSel = selectedNode && selectedNode.id === node.id ? 'selected' : '';
    let html = `<div class="tree-item ${isSel}" onclick="selectNode('${node.id}')">${indent}<span class="tree-icon">${icon}</span> ${node.idName}</div>`;
    
    if(node.children) {
        node.children.forEach(c => html += buildTreeHTML(c, depth+1));
    }
    return html;
}

function renderTree() {
    document.getElementById('treeView').innerHTML = buildTreeHTML(rootNode, 0);
}

function updatePropsPanel() {
    const p = document.getElementById('propsPanel');
    if(!selectedNode) {
        document.getElementById('pId').value = '';
        p.style.opacity = '0.3';
        return;
    }
    p.style.opacity = '1';
    
    document.getElementById('pId').value = selectedNode.idName;
    document.getElementById('pX').value = selectedNode.props.x || 0;
    document.getElementById('pY').value = selectedNode.props.y || 0;
    document.getElementById('pW').value = selectedNode.props.w || 0;
    document.getElementById('pH').value = selectedNode.props.h || 0;
    
    const sFlex = document.getElementById('secFlex');
    if(selectedNode.type === 'cont' || selectedNode.type === 'screen') {
        sFlex.style.display = 'block';
        document.getElementById('pFlex').value = selectedNode.props.flex || 'none';
    } else sFlex.style.display = 'none';
    
    const sTxt = document.getElementById('secText');
    if(selectedNode.type === 'btn' || selectedNode.type === 'label') {
        sTxt.style.display = 'block';
        document.getElementById('pText').value = selectedNode.props.text || '';
        document.getElementById('pBind').value = selectedNode.props.binding || '';
    } else sTxt.style.display = 'none';
}

/* LIVE C CODE GENERATOR */
function generateCode(node, parentVar) {
    if(node.type === 'screen') {
        let code = `<span class="type">void</span> <span class="func">ui_init</span>(<span class="type">void</span>) {\n`;
        code += `    <span class="type">lv_obj_t</span> * ${node.idName} = <span class="func">lv_scr_act</span>();\n\n`;
        if(node.props.flex && node.props.flex !== 'none') {
            const flow = node.props.flex === 'row' ? 'LV_FLEX_FLOW_ROW' : 'LV_FLEX_FLOW_COLUMN';
            code += `    <span class="func">lv_obj_set_flex_flow</span>(${node.idName}, ${flow});\n`;
            code += `    <span class="func">lv_obj_set_flex_align</span>(${node.idName}, LV_FLEX_ALIGN_CENTER, LV_FLEX_ALIGN_CENTER, LV_FLEX_ALIGN_CENTER);\n\n`;
        }
        node.children.forEach(c => code += generateCode(c, node.idName));
        code += `}\n`;
        return code;
    }
    
    let code = `    <span class="comment">// --- ${node.idName} ---</span>\n`;
    
    const isFlexParent = findNode(parentVar)?.props.flex && findNode(parentVar)?.props.flex !== 'none';

    if(node.type === 'cont') {
        code += `    <span class="type">lv_obj_t</span> * ${node.idName} = <span class="func">lv_obj_create</span>(${parentVar});\n`;
        code += `    <span class="func">lv_obj_set_size</span>(${node.idName}, ${node.props.w}, ${node.props.h});\n`;
        if(!isFlexParent) code += `    <span class="func">lv_obj_set_pos</span>(${node.idName}, ${node.props.x}, ${node.props.y});\n`;
        
        if(node.props.flex && node.props.flex !== 'none') {
            const flow = node.props.flex === 'row' ? 'LV_FLEX_FLOW_ROW' : 'LV_FLEX_FLOW_COLUMN';
            code += `    <span class="func">lv_obj_set_flex_flow</span>(${node.idName}, ${flow});\n`;
        }
    } else if(node.type === 'btn') {
        code += `    <span class="type">lv_obj_t</span> * ${node.idName} = <span class="func">lv_btn_create</span>(${parentVar});\n`;
        code += `    <span class="func">lv_obj_set_size</span>(${node.idName}, ${node.props.w}, ${node.props.h});\n`;
        if(!isFlexParent) code += `    <span class="func">lv_obj_set_pos</span>(${node.idName}, ${node.props.x}, ${node.props.y});\n`;
        code += `    <span class="type">lv_obj_t</span> * ${node.idName}_label = <span class="func">lv_label_create</span>(${node.idName});\n`;
        code += `    <span class="func">lv_label_set_text</span>(${node.idName}_label, <span class="str">"${node.props.text}"</span>);\n`;
        code += `    <span class="func">lv_obj_center</span>(${node.idName}_label);\n`;
    } else if(node.type === 'label') {
        code += `    <span class="type">lv_obj_t</span> * ${node.idName} = <span class="func">lv_label_create</span>(${parentVar});\n`;
        if(!isFlexParent) code += `    <span class="func">lv_obj_set_pos</span>(${node.idName}, ${node.props.x}, ${node.props.y});\n`;
        const t = node.props.binding ? `"${node.props.binding}"` : `"${node.props.text}"`;
        code += `    <span class="func">lv_label_set_text</span>(${node.idName}, <span class="str">${t}</span>);\n`;
    } else if(node.type === 'slider') {
        code += `    <span class="type">lv_obj_t</span> * ${node.idName} = <span class="func">lv_slider_create</span>(${parentVar});\n`;
        code += `    <span class="func">lv_obj_set_size</span>(${node.idName}, ${node.props.w}, ${node.props.h});\n`;
        if(!isFlexParent) code += `    <span class="func">lv_obj_set_pos</span>(${node.idName}, ${node.props.x}, ${node.props.y});\n`;
    } else if(node.type === 'bar') {
        code += `    <span class="type">lv_obj_t</span> * ${node.idName} = <span class="func">lv_bar_create</span>(${parentVar});\n`;
        code += `    <span class="func">lv_obj_set_size</span>(${node.idName}, ${node.props.w}, ${node.props.h});\n`;
        if(!isFlexParent) code += `    <span class="func">lv_obj_set_pos</span>(${node.idName}, ${node.props.x}, ${node.props.y});\n`;
    }
    
    code += `\n`;
    node.children.forEach(c => code += generateCode(c, node.idName));
    return code;
}

function updateCodeView() {
    document.getElementById('codeView').innerHTML = generateCode(rootNode, "NULL");
}

function exportIR() {
    // Generate hierarchical IR
    const ir = {
        version: "1.1",
        display: { width: rootNode.props.w, height: rootNode.props.h },
        ui_hierarchy: rootNode
    };
    navigator.clipboard.writeText(JSON.stringify(ir, null, 2));
    alert("Hierarchical JSON exported to clipboard!");
}

init();
</script>
