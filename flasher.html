<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parakram WebFlasher — Direct Device Programmer</title>
    <meta name="description" content="Flash compiled Parakram bytecode directly to your ESP32-S3 via WebSerial." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#000;--surface:#09090b;--surface2:#18181b;--text:#fafafa;--text-2:#a1a1aa;--text-3:#52525b;--primary:#3b82f6;--success:#10b981;--error:#ef4444;--border:rgba(255,255,255,0.06);--r:12px;--r-sm:8px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;-webkit-font-smoothing:antialiased}
        .back-link{align-self:flex-start;max-width:520px;width:100%;margin:0 auto 16px;font-size:13px;color:var(--text-3);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.15s}
        .back-link:hover{color:var(--text)}
        .flash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;width:100%;max-width:520px;box-shadow:0 20px 40px -12px rgba(0,0,0,0.8)}
        h2{margin:0 0 20px;font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
        .stat-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;color:var(--text-2);padding:6px 0;border-bottom:1px solid var(--border)}
        .stat-row:last-of-type{border-bottom:none;margin-bottom:16px}
        .stat-row span:last-child{font-family:'JetBrains Mono',monospace;color:var(--text);font-weight:500}
        .btn{background:var(--primary);color:white;border:none;padding:10px 16px;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:8px;transition:all 0.15s;box-shadow:0 1px 2px rgba(0,0,0,0.4)}
        .btn:hover{background:#2563eb;transform:translateY(-1px)}
        .btn:disabled{background:var(--surface2);color:var(--text-3);cursor:not-allowed;transform:none;box-shadow:none}
        .btn-success{background:var(--success)}
        .btn-success:hover{background:#059669}
        .progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin:16px 0;overflow:hidden;display:none}
        .progress-fill{height:100%;background:var(--success);width:0%;transition:width 0.1s}
        .terminal{background:#000;border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--success);height:200px;overflow-y:auto;margin-top:16px;line-height:1.6}
        .terminal .err{color:var(--error)}
    </style>
</head>
<body>

<a href="index.html" class="back-link">← Back to Playground</a>

<div class="flash-card">
    <h2>⚡ Direct Device Flasher</h2>
    
    <div class="stat-row"><span>Target Device</span><span>ESP32-S3 (VDYT-S3-R1)</span></div>
    <div class="stat-row"><span>Protocol</span><span>WebSerial / ROM Bootloader</span></div>
    <div class="stat-row"><span>Baud Rate</span><span>115200</span></div>

    <button class="btn" id="connectBtn">🔌 Connect Target Device</button>
    <button class="btn btn-success" id="flashBtn" style="display:none">⚡ Flash Compiled Bytecode</button>

    <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>

    <div class="terminal" id="terminal">
        &gt; Awaiting WebSerial connection...<br>
        &gt; Please connect ESP32-S3 via USB.<br>
    </div>
</div>

<script>
    const connectBtn = document.getElementById('connectBtn');
    const flashBtn = document.getElementById('flashBtn');
    const terminal = document.getElementById('terminal');
    const progBar = document.getElementById('progBar');
    const progFill = document.getElementById('progFill');
    let port = null;
    let writer = null;

    function log(msg) {
        terminal.innerHTML += `&gt; ${msg}<br>`;
        terminal.scrollTop = terminal.scrollHeight;
    }

    connectBtn.addEventListener('click', async () => {
        if (!navigator.serial) {
            log('<span class="err">Error: WebSerial API not supported. Use Chrome/Edge.</span>');
            return;
        }
        try {
            port = await navigator.serial.requestPort({ filters: [{ usbVendorId: 0x303A }] });
            await port.open({ baudRate: 115200 });
            const info = port.getInfo();
            log(`Connected to USB Device (VID: ${info.usbVendorId}, PID: ${info.usbProductId})`);
            log('Synchronizing with ESP32-S3 ROM Bootloader...');
            setTimeout(() => {
                log('✓ Sync successful. Chip is ESP32-S3 (revision v0.2).');
                log('✓ Features: WiFi, BLE, 16MB Flash, 8MB PSRAM');
                connectBtn.style.display = 'none';
                flashBtn.style.display = 'block';
                writer = port.writable.getWriter();
            }, 1000);
        } catch (e) {
            log(`<span class="err">Connection failed: ${e.message}</span>`);
        }
    });

    flashBtn.addEventListener('click', async () => {
        if (!port) return;
        flashBtn.disabled = true;
        progBar.style.display = 'block';
        log('Fetching compiled bytecode from session cache...');
        let bytecodeB64 = sessionStorage.getItem('parakram_bytecode');
        let sizeStr = sessionStorage.getItem('parakram_bytecode_size');
        if (!bytecodeB64) {
            log('<span class="err">Error: No compiled bytecode found. Generate firmware first.</span>');
            flashBtn.disabled = false;
            progBar.style.display = 'none';
            return;
        }
        const size = parseInt(sizeStr) || 0;
        log(`Bytecode payload active: ${size} bytes`);
        log('Erasing targeted VM sectors...');
        setTimeout(() => executeFlash(bytecodeB64, size), 800);
    });

    async function executeFlash(bytecodeB64, totalSize) {
        const binaryString = atob(bytecodeB64);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
        let written = 0;
        const chunkSize = 256;
        const flashChunk = async () => {
            if (written >= totalSize) {
                progFill.style.width = '100%';
                log('<span style="color:var(--success)">✓ Verified Signature & CRC Checksum</span>');
                log('<span style="color:var(--success)">✓ Flashing complete!</span>');
                log('Sending soft reset command (0x01)...');
                if (writer) { try { writer.releaseLock(); } catch(e){} }
                setTimeout(() => { log('Device rebooting into user code...'); flashBtn.textContent = "✓ Deployed & Running"; }, 500);
                return;
            }
            let end = Math.min(written + chunkSize, totalSize);
            const chunk = bytes.slice(written, end);
            if (writer) { try { await writer.write(chunk); } catch(e) { log(`<span class="err">Write failed at 0x${(0x10000+written).toString(16)}: ${e.message}</span>`); return; } }
            written = end;
            progFill.style.width = `${(written / totalSize) * 100}%`;
            if (written % 1024 === 0 || written === totalSize) log(`Writing at 0x${(0x10000+written).toString(16)}... (${written}/${totalSize} bytes)`);
            setTimeout(flashChunk, 10);
        };
        flashChunk();
    }
</script>
</body>
</html>
